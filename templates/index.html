<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能摄像头管理系统</title>
  <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4/dist/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f0f2f5; color: #1a1a1a; }

    header {
      background: #fff; border-bottom: 1px solid #e5e7eb;
      padding: 0 24px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }
    header h1 { font-size: 18px; font-weight: 600; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #d1d5db; display: inline-block; margin-right: 6px; }
    .status-dot.online { background: #22c55e; box-shadow: 0 0 0 3px #dcfce7; }

    main { display: grid; grid-template-columns: 1fr 340px; gap: 16px; padding: 16px 24px; max-width: 1400px; margin: 0 auto; }

    /* 卡片通用：统一控制所有信息块的背景、边框和内边距，让页面层次保持一致。 */
    .card { background: #fff; border-radius: 10px; border: 1px solid #e5e7eb; padding: 16px; }
    .card-title { font-size: 13px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 12px; }

    /* 摄像头视频区：左侧主视觉区域，优先保证画面不变形。 */
    #camera-section { grid-column: 1; }
    #video-container { position: relative; background: #111; border-radius: 8px; overflow: hidden; aspect-ratio: 16/9; }
    #video-container img { width: 100%; height: 100%; object-fit: contain; display: block; }
    #no-signal { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #6b7280; font-size: 14px; }
    .cam-controls { display: flex; gap: 8px; margin-top: 10px; }
    .btn { padding: 7px 16px; border-radius: 6px; border: 1px solid #e5e7eb; background: #fff; font-size: 13px; cursor: pointer; transition: background .15s; }
    .btn:hover { background: #f3f4f6; }
    .btn.primary { background: #2563eb; color: #fff; border-color: #2563eb; }
    .btn.primary:hover { background: #1d4ed8; }
    .btn.danger  { background: #ef4444; color: #fff; border-color: #ef4444; }
    .btn.danger:hover { background: #dc2626; }
    .source-panel { margin-top: 12px; padding: 12px; border-radius: 8px; background: #f9fafb; border: 1px solid #eef2f7; }
    .source-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-top: 8px; }
    .source-label { font-size: 12px; color: #6b7280; }
    .source-value { font-size: 12px; color: #111827; word-break: break-all; }
    .source-select, .source-input { width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid #d1d5db; background: #fff; font-size: 13px; }
    .source-select-wrap { min-width: 240px; flex: 1; }
    .source-input-wrap { min-width: 240px; flex: 1; display: none; }
    .source-badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; }
    .source-badge.on { background: #dcfce7; color: #166534; }
    .source-badge.off { background: #f3f4f6; color: #6b7280; }
    .source-badge.warn { background: #fef3c7; color: #92400e; }
    .storage-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin-top: 10px; }
    .storage-stat { background: #fff; border: 1px solid #e5e7eb; border-radius: 6px; padding: 8px 10px; }
    .storage-stat .k { font-size: 11px; color: #6b7280; }
    .storage-stat .v { font-size: 13px; font-weight: 600; color: #111827; margin-top: 2px; }
    .storage-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .storage-input { width: 120px; padding: 8px 10px; border-radius: 6px; border: 1px solid #d1d5db; background: #fff; font-size: 13px; }
    .storage-note { font-size: 12px; color: #6b7280; margin-top: 8px; line-height: 1.4; }

    /* 检测结果：这里当前承载的是关键帧摘要，所以用可滚动列表展示最新状态。 */
    #detection-list { max-height: 120px; overflow-y: auto; margin-top: 10px; display: flex; flex-direction: column; gap: 4px; }
    .det-tag { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 4px; background: #eff6ff; color: #1d4ed8; font-size: 12px; }
    .det-tag .conf { color: #6b7280; }

    /* 右侧面板：传感器、趋势图和告警集中放在这里，便于快速扫一眼系统状态。 */
    aside { display: flex; flex-direction: column; gap: 14px; }

    /* 传感器大数字：把最核心的两个指标放大，适合仪表盘式展示。 */
    .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .metric { background: #f9fafb; border-radius: 8px; padding: 14px; text-align: center; }
    .metric .value { font-size: 36px; font-weight: 700; line-height: 1; }
    .metric .label { font-size: 12px; color: #6b7280; margin-top: 4px; }
    .metric.temp .value { color: #ef4444; }
    .metric.humi .value { color: #3b82f6; }

    /* 折线图：用于观察短时间内的温湿度变化趋势。 */
    .chart-wrap { height: 160px; }

    /* 设备状态：给当前页面维护两个简单状态灯，便于直观判断是否在线。 */
    .device-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f3f4f6; font-size: 13px; }
    .device-row:last-child { border-bottom: none; }
    .badge { padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 500; }
    .badge.ok      { background: #dcfce7; color: #166534; }
    .badge.warn    { background: #fef9c3; color: #854d0e; }
    .badge.offline { background: #f3f4f6; color: #6b7280; }

    /* 告警日志：把规则触发的信息按时间顺序追加，方便回溯。 */
    #alert-list { max-height: 180px; overflow-y: auto; font-size: 12px; color: #6b7280; }
    .alert-row { padding: 5px 0; border-bottom: 1px solid #f3f4f6; }
    .alert-row .time { color: #9ca3af; margin-right: 6px; }
    .alert-row.warn { color: #b45309; }
  </style>
</head>
<body>

<header>
  <h1>📷 智能摄像头管理系统</h1>
  <div style="display:flex;align-items:center;gap:8px;font-size:13px;color:#6b7280">
    <span class="status-dot" id="ws-dot"></span>
    <span id="ws-label">连接中…</span>
  </div>
</header>

<main>
  <!-- 左：摄像头 + 检测 -->
  <section id="camera-section">
    <div class="card" style="margin-bottom:14px">
      <div class="card-title">YOLO 识别画面</div>
      <div id="video-container">
        <img id="video-frame" src="" alt="" style="display:none">
        <div id="no-signal">暂无信号 — 请启动摄像头</div>
      </div>
      <div class="cam-controls">
        <button class="btn primary" onclick="startCamera()">启动</button>
        <button class="btn danger"  onclick="stopCamera()">停止</button>
        <button class="btn"         onclick="requestFrame()">刷新帧</button>
      </div>

      <div class="source-panel">
        <div class="source-label">当前视频源</div>
        <div class="source-value" id="source-current">加载中…</div>
        <div class="source-row" style="margin-top:10px">
          <span class="source-badge off" id="source-status">未知</span>
        </div>

        <div class="source-row">
          <div class="source-select-wrap">
            <select id="source-select" class="source-select" onchange="onSourcePresetChange()"></select>
          </div>
          <button class="btn" onclick="applySourcePreset()">切换</button>
        </div>

        <div class="source-row">
          <div class="source-input-wrap" id="source-input-wrap">
            <input id="source-custom" class="source-input" type="text" placeholder="输入 RTSP 地址或本地视频路径">
          </div>
        </div>
      </div>

      <div class="source-panel">
        <div class="source-label">关键帧本地存储</div>
        <div class="source-value" id="storage-dir">加载中…</div>
        <div class="storage-grid">
          <div class="storage-stat">
            <div class="k">已保存图片</div>
            <div class="v" id="storage-count">--</div>
          </div>
          <div class="storage-stat">
            <div class="k">占用空间</div>
            <div class="v" id="storage-size">--</div>
          </div>
          <div class="storage-stat">
            <div class="k">自动保留</div>
            <div class="v" id="storage-limit">--</div>
          </div>
          <div class="storage-stat">
            <div class="k">最近清理</div>
            <div class="v" id="storage-clean-status">--</div>
          </div>
        </div>

        <div class="storage-actions">
          <input id="storage-limit-input" class="storage-input" type="number" min="1" step="1" placeholder="保留数量">
          <button class="btn" onclick="updateStorageLimit()">更新保留数</button>
          <button class="btn danger" onclick="cleanStorageNow()">立即清理</button>
        </div>
        <div class="storage-note">
          自动清理会始终保留最新的若干张关键帧，避免 `frames_local` 目录无限增长。
        </div>
      </div>

      <div class="source-panel">
        <div class="source-label">YOLO 运行状态</div>
        <div class="source-row" style="margin-top:8px">
          <span class="source-badge off" id="yolo-status-badge">未知</span>
        </div>
        <div class="source-value" id="yolo-status-text">等待 YOLO 启动…</div>
        <div class="storage-note" id="yolo-status-detail">模型与输入源信息会在启动后显示。</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">YOLO 识别结果</div>
      <div id="detection-list"><span style="font-size:13px;color:#9ca3af">等待 YOLO 结果…</span></div>
    </div>
  </section>

  <!-- 右：传感器 + 设备状态 + 告警 -->
  <aside>
    <div class="card">
      <div class="card-title">传感器数据</div>
      <div class="metrics">
        <div class="metric temp">
          <div class="value" id="temp-val">--</div>
          <div class="label">温度 °C</div>
        </div>
        <div class="metric humi">
          <div class="value" id="humi-val">--</div>
          <div class="label">湿度 %</div>
        </div>
      </div>
      <div style="margin-top:12px;font-size:12px;color:#9ca3af" id="sensor-time">--</div>
    </div>

    <div class="card">
      <div class="card-title">温湿度趋势</div>
      <div class="chart-wrap">
        <canvas id="trend-chart"></canvas>
      </div>
    </div>

    <div class="card">
      <div class="card-title">设备状态</div>
      <div id="device-list">
        <div class="device-row">
          <span>MCU-01</span>
          <span class="badge offline" id="mcu-badge">离线</span>
        </div>
        <div class="device-row">
          <span>摄像头</span>
          <span class="badge offline" id="cam-badge">离线</span>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">告警日志</div>
      <div id="alert-list"><div style="font-size:12px;color:#9ca3af">暂无告警</div></div>
    </div>
  </aside>
</main>

<script>
// ── WebSocket 连接 ─────────────────────────────────────────
// 页面和后端的数据流主要靠 Socket.IO 承接，所以连接状态本身也要反映在 UI 上。
const socket = io();

socket.on("connect", () => {
  document.getElementById("ws-dot").classList.add("online");
  document.getElementById("ws-label").textContent = "已连接";
});
socket.on("disconnect", () => {
  document.getElementById("ws-dot").classList.remove("online");
  document.getElementById("ws-label").textContent = "断开";
});

socket.on("camera_source_update", (d) => {
  renderSourceState(d);
});

socket.on("frame_storage_update", (d) => {
  renderStorageState(d);
});

socket.on("yolo_status_update", (d) => {
  renderYoloStatus(d);
});

// ── 传感器数据处理 ─────────────────────────────────────────
// 这里用 Chart.js 维护一个轻量趋势图，适合实时追加而不是重绘整个历史数据集。
const MAX_POINTS = 30;
const tempData = [], humiData = [], labels = [];

const ctx = document.getElementById("trend-chart").getContext("2d");
const chart = new Chart(ctx, {
  type: "line",
  data: {
    labels,
    datasets: [
      { label: "温度°C", data: tempData, borderColor: "#ef4444", backgroundColor: "rgba(239,68,68,.08)", tension: 0.4, pointRadius: 2 },
      { label: "湿度%",  data: humiData, borderColor: "#3b82f6", backgroundColor: "rgba(59,130,246,.08)", tension: 0.4, pointRadius: 2 }
    ]
  },
  options: {
    animation: false, responsive: true, maintainAspectRatio: false,
    plugins: { legend: { labels: { font: { size: 11 } } } },
    scales: { x: { ticks: { maxTicksLimit: 6, font: { size: 10 } } }, y: { ticks: { font: { size: 10 } } } }
  }
});

socket.on("sensor_update", (d) => {
  if (d.temp === undefined || d.humi === undefined) {
    return;
  }
  document.getElementById("temp-val").textContent = d.temp.toFixed(1);
  document.getElementById("humi-val").textContent = d.humi.toFixed(1);
  document.getElementById("sensor-time").textContent = "更新: " + new Date(d.timestamp).toLocaleTimeString();

  // 只追加当前点，不重新拉取全量历史，这样性能更稳，也更接近实时仪表盘的使用方式。
  const t = new Date(d.timestamp).toLocaleTimeString("zh", {hour:"2-digit",minute:"2-digit",second:"2-digit"});
  labels.push(t); tempData.push(d.temp); humiData.push(d.humi);
  if (labels.length > MAX_POINTS) { labels.shift(); tempData.shift(); humiData.shift(); }
  chart.update("none");

  // 收到传感器数据，就认为 MCU 已在线。
  const b = document.getElementById("mcu-badge");
  b.textContent = "在线"; b.className = "badge ok";

  // 一个非常基础的告警规则示例：温度超过阈值就往日志里打一条。
  if (d.temp > 35) addAlert(`温度过高: ${d.temp}°C`, "warn");
});

// ── 检测结果处理 ───────────────────────────────────────────
// 这里既兼容原来的 YOLO 结果，也兼容当前的关键帧结果。
socket.on("detection_result", (d) => {
  const list = document.getElementById("detection-list");
  list.innerHTML = "";
  const metaHead = document.createElement("div");
  metaHead.style.cssText = "font-size:12px;color:#6b7280;line-height:1.5;margin-bottom:6px";
  metaHead.textContent = `来源: ${d.source_name ?? "--"} | 任务: ${d.task ?? "detect"}`;
  list.appendChild(metaHead);
  if (!d.detections.length) {
    const empty = document.createElement("span");
    empty.style.cssText = "font-size:13px;color:#9ca3af";
    empty.textContent = "未检测到目标";
    list.appendChild(empty);
    return;
  }
  d.detections.forEach(det => {
    const tag = document.createElement("span");
    tag.className = "det-tag";
    tag.innerHTML = `${det.label} <span class="conf">${(det.conf*100).toFixed(0)}%</span>`;
    list.appendChild(tag);
  });

  // 如果后端同时带回了处理后的画面，就直接覆盖当前视频窗口。
  if (d.frame_b64) showFrame(d.frame_b64);
});

socket.on("frame_update", (d) => {
  const list = document.getElementById("detection-list");
  list.innerHTML = "";

  const tag = document.createElement("span");
  tag.className = "det-tag";
  tag.innerHTML = `关键帧 #${d.saved_count} <span class="conf">差异 ${(d.diff ?? 0).toFixed(2)}</span>`;
  list.appendChild(tag);

  const meta = document.createElement("div");
  meta.style.cssText = "margin-top:8px;font-size:12px;color:#6b7280;line-height:1.5";
  meta.innerHTML = `
    <div>帧序号：${d.frame_index}</div>
    <div>比较尺寸：${d.compare_size?.[0] ?? 320} × ${d.compare_size?.[1] ?? 180}</div>
    ${d.saved_path ? `<div>已保存：${d.saved_path}</div>` : ""}
  `;
  list.appendChild(meta);
});

socket.on("frame", (d) => {
  if (d.image) showFrame(d.image);
});

// ── 摄像头控制 ─────────────────────────────────────────────
// 这两个按钮只是触发后端状态切换，不直接操作浏览器本地视频流。
function showFrame(b64) {
  const img = document.getElementById("video-frame");
  img.src = "data:image/jpeg;base64," + b64;
  img.style.display = "block";
  document.getElementById("no-signal").style.display = "none";
  document.getElementById("cam-badge").textContent = "在线";
  document.getElementById("cam-badge").className = "badge ok";
}

function startCamera() {
  fetch("/api/camera/start", {method:"POST"})
    .then(r => r.json()).then(d => addAlert("摄像头、YOLO 与关键帧处理已启动"));
}
function stopCamera() {
  fetch("/api/camera/stop", {method:"POST"})
    .then(r => r.json()).then(() => {
      document.getElementById("cam-badge").textContent = "离线";
      document.getElementById("cam-badge").className = "badge offline";
    });
}
function requestFrame() { socket.emit("request_frame"); }

function renderSourceState(d) {
  const current = document.getElementById("source-current");
  const status = document.getElementById("source-status");
  const select = document.getElementById("source-select");
  const inputWrap = document.getElementById("source-input-wrap");
  const customInput = document.getElementById("source-custom");

  if (!d) return;

  const requested = d.requested_source ?? "--";
  const active = d.active_source ?? requested;
  current.textContent = `请求源: ${requested} | 活动源: ${active ?? "--"}`;
  status.textContent = d.is_running ? "运行中" : "已停止";
  status.className = "source-badge " + (d.is_running ? "on" : "off");

  if (d.options && !select.dataset.loaded) {
    select.innerHTML = "";
    d.options.forEach(opt => {
      const option = document.createElement("option");
      option.value = opt.value;
      option.textContent = `${opt.label} - ${opt.description}`;
      select.appendChild(option);
    });
    select.dataset.loaded = "1";
  }

  const presetValues = Array.from(select.options).map(opt => opt.value);
  const matchedPreset = presetValues.includes(String(requested)) ? String(requested) : "__custom__";
  select.value = matchedPreset;
  inputWrap.style.display = matchedPreset === "__custom__" ? "block" : "none";
  if (matchedPreset === "__custom__" && requested !== "--") {
    customInput.value = requested;
  }
}

function onSourcePresetChange() {
  const select = document.getElementById("source-select");
  const inputWrap = document.getElementById("source-input-wrap");
  inputWrap.style.display = select.value === "__custom__" ? "block" : "none";
}

function applySourcePreset() {
  const select = document.getElementById("source-select");
  const custom = document.getElementById("source-custom");
  const source = select.value === "__custom__" ? custom.value.trim() : select.value;

  if (!source) {
    addAlert("请输入可用的视频源地址", "warn");
    return;
  }

  fetch("/api/camera/source", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({source})
  })
    .then(r => r.json())
    .then(d => {
      if (d.error) {
        addAlert("切换失败: " + d.error, "warn");
        return;
      }
      renderSourceState(d);
      addAlert("视频源已切换为: " + d.requested_source);
    });
}

function renderStorageState(d) {
  if (!d) return;

  document.getElementById("storage-dir").textContent = d.output_dir ?? "--";
  document.getElementById("storage-count").textContent = d.saved_file_count ?? 0;
  document.getElementById("storage-size").textContent = (d.total_size_mb ?? 0).toFixed(3) + " MB";
  document.getElementById("storage-limit").textContent = d.max_saved_images ?? "--";
  document.getElementById("storage-clean-status").textContent = d.status ?? "ok";
  document.getElementById("storage-limit-input").value = d.max_saved_images ?? "";
}

function renderYoloStatus(d) {
  if (!d) return;

  const badge = document.getElementById("yolo-status-badge");
  const text = document.getElementById("yolo-status-text");
  const detail = document.getElementById("yolo-status-detail");

  const state = d.state ?? "unknown";
  const stateLabel = {
    idle: "待启动",
    ready: "已就绪",
    running: "运行中",
    error: "异常",
    stopped: "已停止",
  }[state] ?? state;

  badge.textContent = stateLabel;
  badge.className = "source-badge " + (state === "running" || state === "ready" ? "on" : state === "error" ? "warn" : "off");
  text.textContent = d.message ?? "暂无状态";
  detail.innerHTML = `
    <div>模型：${d.model_path ?? "--"}</div>
    <div>输入源：${d.source_name ?? "--"}</div>
    <div>任务：${d.task ?? "detect"}</div>
  `;
}

function updateStorageLimit() {
  const input = document.getElementById("storage-limit-input");
  const maxSavedImages = parseInt(input.value, 10);
  if (!Number.isInteger(maxSavedImages) || maxSavedImages < 1) {
    addAlert("请输入大于 0 的保留数量", "warn");
    return;
  }

  fetch("/api/frame/storage", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({max_saved_images: maxSavedImages})
  })
    .then(r => r.json())
    .then(d => {
      if (d.error) {
        addAlert("更新保留数量失败: " + d.error, "warn");
        return;
      }
      renderStorageState(d);
      addAlert("已更新自动保留数量为 " + d.max_saved_images);
    });
}

function cleanStorageNow() {
  const input = document.getElementById("storage-limit-input");
  const keepCount = parseInt(input.value, 10);
  const body = Number.isInteger(keepCount) && keepCount > 0 ? {keep_count: keepCount} : {};

  fetch("/api/frame/cleanup", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(body)
  })
    .then(r => r.json())
    .then(d => {
      if (d.error) {
        addAlert("清理失败: " + d.error, "warn");
        return;
      }
      renderStorageState(d);
      addAlert(`已清理 ${d.removed_count ?? 0} 张旧图片`);
    });
}

// ── 告警日志 ───────────────────────────────────────────────
// 为了避免日志无限增长，这里只保留最近一批消息。
function addAlert(msg, level = "info") {
  const list = document.getElementById("alert-list");
  if (list.querySelector("span")) list.innerHTML = "";
  const row = document.createElement("div");
  row.className = "alert-row" + (level === "warn" ? " warn" : "");
  row.innerHTML = `<span class="time">${new Date().toLocaleTimeString()}</span>${msg}`;
  list.prepend(row);
  if (list.children.length > 50) list.lastChild.remove();
}

// 页面首次打开时先拉一次最新传感器状态，减少“全是空白”的等待感。
fetch("/api/sensor/latest").then(r => r.json()).then(d => {
  if (d.temp !== undefined) socket.emit("sensor_update", d);
});

fetch("/api/camera/source")
  .then(r => r.json())
  .then(d => renderSourceState(d));

fetch("/api/frame/storage")
  .then(r => r.json())
  .then(d => renderStorageState(d));
</script>
